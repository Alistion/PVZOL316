<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>PvZ - GM 控制台</title>
        <style>
            body {
                font-family: sans-serif;
                background: #f4f4f4;
                padding: 30px;
                margin: 0;
                color: #333;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
                max-width: 1200px;
                margin-left: auto;
                margin-right: auto;
            }
            .header h1 {
                margin: 0;
                color: #333;
                font-size: 24px;
            }
            .header a {
                color: #007bff;
                text-decoration: none;
                font-weight: bold;
            }
            .header a:hover {
                text-decoration: underline;
            }

            .container {
                background: #fff;
                padding: 20px 30px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                margin-bottom: 20px;
                max-width: 1200px;
                margin-left: auto;
                margin-right: auto;
                overflow-x: auto;
            }
            .container h3 {
                margin-top: 0;
                color: #333;
                font-size: 18px;
                border-bottom: 1px solid #eee;
                padding-bottom: 10px;
            }

            table {
                border-collapse: collapse;
                width: 100%;
                margin-top: 10px;
            }
            th,
            td {
                border: 1px solid #e0e0e0;
                padding: 12px;
                text-align: center;
            }
            th {
                background-color: #f8f9fa;
                font-weight: bold;
                color: #555;
            }
            tr:hover {
                background-color: #f1f7fd;
            }

            input[type="number"],
            input[type="text"],
            select {
                padding: 8px;
                border: 1px solid #ccc;
                border-radius: 4px;
                box-sizing: border-box;
                width: 100%;
                outline: none;
                transition: border 0.3s;
                font-size: 14px;
                background: white;
            }
            input:focus,
            select:focus {
                border-color: #007bff;
            }

            .btn {
                border: none;
                padding: 8px 15px;
                cursor: pointer;
                font-weight: bold;
                border-radius: 4px;
                color: white;
                transition: background 0.2s;
                font-size: 14px;
                white-space: nowrap;
            }
            .btn-primary {
                background: #007bff;
            }
            .btn-primary:hover {
                background: #0056b3;
            }
            .btn-danger {
                background: #dc3545;
            }
            .btn-danger:hover {
                background: #c82333;
            }
            .btn-success {
                background: #28a745;
            }
            .btn-success:hover {
                background: #218838;
            }
            .btn-warning {
                background: #ffc107;
                color: #212529;
            }
            .btn-warning:hover {
                background: #e0a800;
            }

            .panels {
                display: flex;
                gap: 20px;
                flex-wrap: wrap;
                max-width: 1200px;
                margin-left: auto;
                margin-right: auto;
            }
            .panel {
                background: #fff;
                padding: 20px 30px;
                border-radius: 8px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                flex: 1;
                min-width: 300px;
            }
            .panel h3 {
                margin-top: 0;
                color: #333;
                font-size: 18px;
                border-bottom: 1px solid #eee;
                padding-bottom: 10px;
                margin-bottom: 15px;
            }
            .form-group {
                margin-bottom: 15px;
                text-align: left;
            }
            .form-group label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
                color: #555;
                font-size: 14px;
            }
            .uid-badge {
                font-weight: bold;
                color: #007bff;
                font-size: 16px;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>🛠️ GM 控制台</h1>
            <a href="/">返回游戏主页</a>
        </div>

        <!-- ── 1. 角色属性管理 ── -->
        <div class="container">
            <h3>👥 1. 角色属性管理</h3>
            <table>
                <thead>
                    <tr>
                        <th style="width: 100px">UID</th>
                        <th>角色名</th>
                        <th style="width: 140px">金币</th>
                        <th style="width: 140px">金券</th>
                        <th style="width: 90px">等级</th>
                        <th style="width: 80px">保存</th>
                        <th style="width: 220px">危险操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in users %} {% set uid = u.id + 100000 %}
                    <tr>
                        <!-- 属性修改表单 -->
                        <form method="POST" action="/gm">
                            <input
                                type="hidden"
                                name="action"
                                value="update_user"
                            />
                            <input type="hidden" name="uid" value="{{ uid }}" />

                            <td class="uid-badge">{{ uid }}</td>
                            <td style="color: #666">{{ u.username }}</td>
                            <td>
                                <input
                                    type="number"
                                    name="money"
                                    value="{{ u.money }}"
                                />
                            </td>
                            <td>
                                <input
                                    type="number"
                                    name="rmb_money"
                                    value="{{ u.rmb_money }}"
                                />
                            </td>
                            <td>
                                <input
                                    type="number"
                                    name="level"
                                    value="{{ u.level }}"
                                />
                            </td>
                            <td>
                                <button type="submit" class="btn btn-success">
                                    保存
                                </button>
                            </td>
                        </form>

                        <!-- 危险操作列（独立表单） -->
                        <td>
                            <form
                                method="POST"
                                action="/gm"
                                style="display: inline"
                            >
                                <input
                                    type="hidden"
                                    name="action"
                                    value="clear_orgs"
                                />
                                <input
                                    type="hidden"
                                    name="uid"
                                    value="{{ uid }}"
                                />
                                <button
                                    type="submit"
                                    class="btn btn-warning"
                                    onclick="return confirm('确定清空 UID {{ uid }} 的所有植物吗？')"
                                >
                                    清空植物
                                </button>
                            </form>
                            &nbsp;
                            <form
                                method="POST"
                                action="/gm"
                                style="display: inline"
                            >
                                <input
                                    type="hidden"
                                    name="action"
                                    value="delete_user"
                                />
                                <input
                                    type="hidden"
                                    name="uid"
                                    value="{{ uid }}"
                                />
                                <button
                                    type="submit"
                                    class="btn btn-danger"
                                    onclick="return confirm('⚠️ 警告：确定彻底删除 UID {{ uid }} 的账号吗？\n此操作不可逆！')"
                                >
                                    删除账号
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- ── 功能面板行 ── -->
        <div class="panels">
            <!-- 2. 物品发送 -->
            <div class="panel">
                <h3>📦 2. 物品发送</h3>
                <form method="POST" action="/gm">
                    <input type="hidden" name="action" value="add_tool" />
                    <div class="form-group">
                        <label>玩家 UID</label>
                        <select name="uid" required>
                            {% for u in users %}
                            <option value="{{ u.id + 100000 }}">
                                {{ u.id + 100000 }} - {{ u.username }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>道具 ID</label>
                        <input type="number" name="tool_id" required />
                    </div>
                    <div class="form-group">
                        <label>数量</label>
                        <input
                            type="number"
                            name="amount"
                            value="99"
                            required
                        />
                    </div>
                    <button
                        type="submit"
                        class="btn btn-primary"
                        style="width: 100%"
                    >
                        确认发送
                    </button>
                </form>
            </div>

            <!-- 3. 世界之树 -->
            <div class="panel">
                <h3>🌲 3. 世界之树</h3>
                <form method="POST" action="/gm">
                    <input type="hidden" name="action" value="reset_tree" />
                    <div class="form-group">
                        <label>玩家 UID</label>
                        <select name="uid" required>
                            {% for u in users %}
                            <option value="{{ u.id + 100000 }}">
                                {{ u.id + 100000 }} - {{ u.username }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <button
                        type="submit"
                        class="btn btn-warning"
                        style="width: 100%"
                    >
                        重置高度
                    </button>
                </form>
            </div>

            <!-- 4. 账号数据克隆 -->
            <div class="panel">
                <h3>👯 4. 账号数据克隆</h3>
                <form method="POST" action="/gm">
                    <input type="hidden" name="action" value="clone_user" />
                    <div class="form-group">
                        <label>数据来源（被复制的大号）</label>
                        <select name="source_uid" required>
                            {% for u in users %}
                            <option value="{{ u.id + 100000 }}">
                                {{ u.id + 100000 }} - {{ u.username }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>覆盖目标（接收数据的新号）</label>
                        <select name="target_uid" required>
                            {% for u in users %}
                            <option value="{{ u.id + 100000 }}">
                                {{ u.id + 100000 }} - {{ u.username }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <button
                        type="submit"
                        class="btn btn-danger"
                        style="width: 100%"
                        onclick="
                            return confirm(
                                '⚠️ 严重警告：目标账号的所有金钱、物品和植物将被覆盖！\n\n确认执行克隆吗？',
                            );
                        "
                    >
                        🚀 确认执行克隆覆盖
                    </button>
                </form>
            </div>
        </div>
    </body>
</html>
