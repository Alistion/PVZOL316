<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>PvZ - GM 控制台</title>
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                font-family: sans-serif;
                background: #f0f2f5;
                margin: 0;
                padding: 30px;
                color: #333;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                max-width: 1100px;
                margin: 0 auto 24px;
            }
            .header h1 {
                margin: 0;
                font-size: 22px;
            }
            .header a {
                color: #007bff;
                text-decoration: none;
                font-weight: bold;
            }

            .card {
                background: #fff;
                border-radius: 10px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                padding: 24px 28px;
                max-width: 1100px;
                margin: 0 auto 24px;
            }
            .card h3 {
                margin: 0 0 16px;
                font-size: 16px;
                color: #555;
                border-bottom: 1px solid #f0f0f0;
                padding-bottom: 10px;
            }

            table {
                border-collapse: collapse;
                width: 100%;
            }
            th,
            td {
                padding: 11px 14px;
                text-align: left;
                border-bottom: 1px solid #f0f0f0;
                font-size: 14px;
            }
            th {
                color: #888;
                font-weight: 600;
                background: #fafafa;
            }
            tr:last-child td {
                border-bottom: none;
            }
            tr:hover td {
                background: #f7faff;
            }

            .uid {
                font-weight: bold;
                color: #007bff;
                font-size: 15px;
            }
            .name {
                font-weight: 600;
            }

            .btn {
                display: inline-block;
                padding: 6px 14px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 13px;
                font-weight: bold;
                text-decoration: none;
                transition: opacity 0.15s;
            }
            .btn:hover {
                opacity: 0.82;
            }
            .btn-primary {
                background: #007bff;
                color: #fff;
            }
            .btn-danger {
                background: #dc3545;
                color: #fff;
            }
            .btn-warning {
                background: #ffc107;
                color: #212529;
            }

            /* Clone panel */
            .clone-row {
                display: flex;
                gap: 16px;
                align-items: flex-end;
                flex-wrap: wrap;
            }
            .clone-row .fg {
                display: flex;
                flex-direction: column;
                gap: 5px;
                flex: 1;
                min-width: 180px;
            }
            .clone-row label {
                font-size: 13px;
                font-weight: 600;
                color: #555;
            }
            select,
            input[type="number"],
            input[type="text"] {
                padding: 8px 10px;
                border: 1px solid #d9d9d9;
                border-radius: 5px;
                font-size: 14px;
                width: 100%;
                background: #fff;
                outline: none;
                transition: border 0.2s;
            }
            select:focus,
            input:focus {
                border-color: #007bff;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>🛠️ GM 控制台</h1>
            <a href="/">← 返回游戏</a>
        </div>

        <!-- ── 用户列表 ── -->
        <div class="card">
            <h3>👥 用户列表</h3>
            <table>
                <thead>
                    <tr>
                        <th>UID</th>
                        <th>用户名</th>
                        <th>等级</th>
                        <th>金币</th>
                        <th>金券</th>
                        <th>荣誉</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in users %} {% set uid = u.id + 100000 %}
                    <tr>
                        <td class="uid">{{ uid }}</td>
                        <td class="name">{{ u.username }}</td>
                        <td>{{ u.level }}</td>
                        <td>{{ u.money }}</td>
                        <td>{{ u.rmb_money }}</td>
                        <td>{{ u.honor or 0 }}</td>
                        <td>
                            <a href="/gm/user/{{ uid }}" class="btn btn-primary"
                                >⚙️ 管理</a
                            >
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td
                            colspan="7"
                            style="
                                text-align: center;
                                color: #aaa;
                                padding: 30px;
                            "
                        >
                            暂无用户
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- ── 账号数据克隆 ── -->
        <div class="card">
            <h3>👯 账号数据克隆</h3>
            <form
                method="POST"
                action="/gm"
                onsubmit="
                    return confirm(
                        '⚠️ 目标账号的所有金钱、道具和植物将被完全覆盖！\n\n确认执行？',
                    );
                "
            >
                <input type="hidden" name="action" value="clone_user" />
                <div class="clone-row">
                    <div class="fg">
                        <label>数据来源（被复制的大号）</label>
                        <select name="source_uid" required>
                            {% for u in users %}
                            <option value="{{ u.id + 100000 }}">
                                {{ u.id + 100000 }} - {{ u.username }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="fg">
                        <label>覆盖目标（接收数据的小号）</label>
                        <select name="target_uid" required>
                            {% for u in users %}
                            <option value="{{ u.id + 100000 }}">
                                {{ u.id + 100000 }} - {{ u.username }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <button type="submit" class="btn btn-danger">
                            🚀 执行克隆覆盖
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </body>
</html>
